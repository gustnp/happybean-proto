<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해피빈 캠페인 프로토타입</title>
<style>
  :root{
    --primary:#2f7fd4; --accent:#16c265;
    --hero-from:#cfe7fb; --hero-to:#eef7e9;
    --band1:#eaf4fd; --band2:#eaf7ef;
    --ink:#2c2f33; --body:#5b6168; --muted:#9aa0a6;
    --card:#fff; --line:#eceef0; --skeleton:#e3e6ea;
    --w:960px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:#fff;color:var(--body);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;}
  .container{max-width:var(--w);margin:0 auto;padding:0 24px;}
  .band{padding:clamp(52px,7vw,84px) 0;}
  .band.tight{padding:clamp(28px,4vw,44px) 0;}
  .band.b-hero{background:linear-gradient(180deg,var(--hero-from),var(--hero-to));}
  .band.b-band1{background:var(--band1);}
  .band.b-band2{background:var(--band2);}
  .center{text-align:center;}
  .pre{white-space:pre-line;}
  .h1{font-size:clamp(28px,4.6vw,42px);font-weight:800;line-height:1.34;color:var(--ink);}
  .h2{font-size:clamp(22px,3.4vw,30px);font-weight:800;line-height:1.36;color:var(--ink);}
  .lead{font-size:clamp(15px,1.8vw,17px);line-height:1.68;}
  .eyebrow{display:inline-block;background:#fff;color:var(--primary);border:1px solid var(--line);
    font-size:13px;font-weight:700;padding:7px 16px;border-radius:20px;}
  .stack>*+*{margin-top:18px;}

  .img-ph{border:2px dashed #c4ccd2;border-radius:16px;background:#f6f8fa;
    display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--muted);font-size:13px;min-height:150px;padding:20px;line-height:1.6;
    position:relative;transition:border-color .15s,background .15s;}
  .img-ph.droppable{cursor:pointer;}
  .img-ph.droppable:hover,.img-ph.drag-over{border-color:var(--primary);background:#f0f6ff;}
  .img-ph.drag-over{border-color:var(--accent);background:#f0faf5;}
  .img-drop-hint{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
  .img-drop-hint .ico{font-size:28px;}
  .img-real{border-radius:16px;width:100%;display:block;}

  .pill-btn{display:inline-flex;align-items:center;justify-content:center;min-height:50px;
    padding:0 34px;background:var(--accent);color:#fff;border-radius:28px;font-weight:700;
    font-size:16px;box-shadow:0 6px 14px rgba(0,0,0,.12);cursor:pointer;border:none;
    transition:transform .1s,opacity .15s;}
  .pill-btn:active{transform:scale(.97);}
  .pill-btn:disabled{opacity:.6;cursor:default;transform:none;}
  .pill-btn.ghost{background:#fff;color:var(--primary);border:1.5px solid var(--primary);
    box-shadow:none;min-height:42px;padding:0 24px;font-size:14px;}
  .bean{display:inline-block;background:#fff;border:1px solid var(--line);color:var(--body);
    font-size:13px;font-weight:700;padding:7px 16px;border-radius:18px;}
  .bean:before{content:"🌱 ";}

  .bubble{position:relative;display:inline-block;background:#fff;border:1px solid var(--line);
    border-radius:18px;padding:22px 30px;max-width:540px;box-shadow:0 8px 20px rgba(0,0,0,.05);}
  .bubble:after{content:"";position:absolute;left:50%;bottom:-11px;transform:translateX(-50%) rotate(45deg);
    width:20px;height:20px;background:#fff;border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
  .qcard{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--line);
    border-radius:16px;padding:20px 22px;box-shadow:0 4px 12px rgba(0,0,0,.04);text-align:left;
    cursor:pointer;transition:border-color .15s,background .15s;}
  .qcard:hover{border-color:var(--primary);background:#f8fbff;}
  .qcard .ic{flex:none;width:48px;height:48px;border-radius:50%;background:var(--band1);transition:background .2s;}
  .qcard.correct-reveal{border:2px solid #16c265!important;background:#f0faf5!important;}
  .qcard.correct-reveal .ic{background:#16c265!important;}
  .qcard.wrong-reveal{border:2px solid #e05050!important;background:#fff5f5!important;}
  .qcard.wrong-reveal .ic{background:#e05050!important;}
  .quiz-answered .qcard{pointer-events:none;}

  .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .chan-card{background:#fff;border:1px solid var(--line);border-radius:18px;
    padding:28px 20px;text-align:center;box-shadow:0 6px 16px rgba(0,0,0,.05);}
  .chan-badge{display:inline-block;background:var(--primary);color:#fff;font-size:12.5px;
    font-weight:700;padding:6px 14px;border-radius:16px;}
  .chan-title{font-size:17px;font-weight:800;color:var(--ink);margin-top:14px;}
  .chan-desc{font-size:14px;line-height:1.6;margin-top:10px;}

  .social-row{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;}
  .social{width:44px;height:44px;border-radius:12px;background:var(--skeleton);
    display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa;overflow:hidden;
    cursor:pointer;transition:opacity .15s;}
  .social:hover{opacity:.75;}
  .amount{font-size:clamp(30px,5vw,46px);font-weight:800;color:var(--primary);}

  .gnb{background:#fff;border-bottom:1px solid #eef0f2;}
  .gnb-inner{display:flex;align-items:center;height:70px;gap:20px;}
  .gnb-logo{flex:none;display:flex;align-items:center;gap:9px;font-size:21px;font-weight:800;color:#03c75a;}
  .gnb-logo .n{width:28px;height:28px;border-radius:7px;background:#03c75a;color:#fff;font-size:17px;
    font-weight:800;display:flex;align-items:center;justify-content:center;}
  .gnb-menu{flex:1;display:flex;justify-content:center;gap:48px;font-size:17px;color:#333;font-weight:700;}
  .gnb-menu .on{color:#03c75a;}
  .gnb-right{flex:none;display:flex;align-items:center;gap:7px;font-size:16px;color:#333;font-weight:700;}
  .gnb-right svg{width:19px;height:19px;stroke:#555;fill:none;}
  .ft{background:#f4f6f7;color:#9098a0;padding:40px 0;font-size:12.5px;line-height:1.8;}
  .ft b{color:#6b7178;font-weight:700;}

  .floating{position:fixed;top:96px;right:24px;z-index:55;background:var(--primary);border-radius:18px;
    padding:13px 22px;text-align:center;box-shadow:0 8px 18px rgba(0,0,0,.25);color:#fff;}
  .floating .lbl{font-size:12px;font-weight:700;opacity:.9;}
  .floating .val{font-size:23px;font-weight:800;color:#f1ff3d;margin-top:3px;}
  .floating .val small{font-size:13px;color:#fff;font-weight:700;margin-left:3px;}
  .floating .stamp{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.25);
    margin:8px auto 0;border:2px dashed rgba(255,255,255,.6);}

  .cmt{border-top:2px solid #eef0f2;padding-top:28px;}
  .cmt-head{font-size:15px;color:var(--ink);font-weight:700;margin-bottom:16px;}
  .cmt-head b{color:var(--accent);}
  .cmt-write{display:flex;gap:10px;margin-bottom:6px;}
  .cmt-input{flex:1;border:1px solid var(--line);border-radius:12px;background:#fafbfc;
    padding:16px 18px;color:var(--ink);font-size:14px;min-height:62px;resize:vertical;font-family:inherit;outline:none;}
  .cmt-input:focus{border-color:var(--accent);}
  .cmt-submit{flex:none;display:flex;align-items:center;background:var(--accent);color:#fff;
    font-weight:700;border-radius:12px;padding:0 26px;font-size:15px;cursor:pointer;border:none;}
  .cmt-submit:active{opacity:.85;}
  .cmt-item{display:flex;gap:14px;padding:20px 2px;border-top:1px solid #eef0f2;animation:fadeIn .3s ease;}
  .cmt-item .av{flex:none;width:40px;height:40px;border-radius:50%;background:var(--skeleton);}
  .cmt-name{font-weight:700;color:var(--ink);font-size:14px;}
  .cmt-date{color:var(--muted);font-size:12.5px;margin-left:8px;}
  .cmt-text{font-size:14px;line-height:1.6;margin-top:6px;}
  .cmt-act{margin-top:10px;font-size:12.5px;color:var(--muted);display:flex;gap:16px;}
  .more{display:inline-block;border:1px solid var(--line);border-radius:24px;
    padding:13px 30px;color:var(--muted);font-size:14px;background:#fff;cursor:pointer;}

  .plan-note{max-width:var(--w);margin:0 auto;padding:0 24px;display:none;}
  .plan-note .inner{display:flex;gap:10px;align-items:flex-start;margin:18px 0 0;flex-wrap:wrap;}
  .plan-tag{flex:none;background:#3c4148;color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:6px;}
  .plan-txt{margin:0;font-size:13px;line-height:1.6;color:#4a505a;background:#f1f3f5;
    border:1px solid #e3e6ea;border-radius:8px;padding:8px 13px;flex:1;min-width:240px;}
  body.mode-plan .plan-note{display:block;}
  .spec-sheet{max-width:var(--w);margin:0 auto;padding:0 24px;display:none;}
  .spec-card{border:1px solid #dfe3e8;border-left:4px solid var(--primary);border-radius:8px;
    background:#fbfcfd;padding:16px 20px;margin:14px 0 0;font-size:13px;line-height:1.7;color:#3c4148;}
  .spec-card h4{margin:0 0 8px;font-size:13px;color:var(--primary);}
  .spec-card ul{margin:4px 0;padding-left:18px;}
  body.mode-spec .spec-sheet{display:block;}
  .doc-head{display:none;background:#23262b;color:#e8eaed;padding:34px 0;}
  .doc-head h1{margin:0 0 8px;font-size:22px;}
  .doc-head .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 24px;
    font-size:13.5px;line-height:1.7;margin-top:14px;}
  .doc-head .grid b{color:#fff;}
  body.mode-plan .doc-head,body.mode-spec .doc-head{display:block;}

  /* 툴바 */
  .topbar{position:sticky;top:0;z-index:60;background:#1f2226;color:#eee;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:10px 18px;font-size:13px;flex-wrap:wrap;}
  .topbar .label b{color:#fff;}
  .seg{display:flex;background:#33373c;border-radius:20px;padding:3px;}
  .seg button{border:0;background:transparent;color:#bbb;font-size:12.5px;font-weight:700;
    padding:6px 16px;border-radius:16px;cursor:pointer;}
  .seg button.on{background:var(--accent);color:#fff;}
  .tb-btn{background:#33373c;border:1px solid #4a4f55;color:#fff;padding:7px 13px;border-radius:20px;
    font-size:12.5px;cursor:pointer;transition:background .15s;}
  .tb-btn.active{background:var(--accent);border-color:var(--accent);}
  .tb-btn.mobile-on{background:#4a90d9;border-color:#4a90d9;}
  .save-dot{width:7px;height:7px;border-radius:50%;background:#f1ff3d;display:inline-block;
    margin-left:4px;opacity:0;transition:opacity .3s;vertical-align:middle;}
  .save-dot.show{opacity:1;}
  .tb-undo,.tb-redo{opacity:.4;pointer-events:none;}
  .tb-undo.on,.tb-redo.on{opacity:1;pointer-events:auto;}

  /* 에디터 패널 */
  .ep{position:fixed;top:0;right:0;height:100vh;width:300px;background:#1a1d21;color:#e0e2e6;
    z-index:70;display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:-6px 0 28px rgba(0,0,0,.45);}
  .ep.open{transform:translateX(0);}
  .ep-header{display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px;background:#13161a;border-bottom:1px solid #2e3238;flex-shrink:0;}
  .ep-header h3{margin:0;font-size:13px;font-weight:700;color:#fff;}
  .ep-close{background:none;border:none;color:#777;font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
  .ep-close:hover{color:#fff;}
  .ep-tabs{display:flex;background:#13161a;border-bottom:1px solid #2e3238;flex-shrink:0;}
  .ep-tabs button{flex:1;border:none;background:none;color:#777;font-size:12px;font-weight:700;
    padding:10px 4px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .ep-tabs button.on{color:#fff;border-bottom-color:var(--accent);}
  .ep-body{flex:1;overflow-y:auto;padding:14px;}
  .ep-body.hidden{display:none;}
  .ep-group{margin-bottom:18px;}
  .ep-group-label{font-size:10.5px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.07em;
    margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #252a31;}
  .ep-row{margin-bottom:10px;}
  .ep-row label{display:block;font-size:11.5px;color:#999;margin-bottom:4px;}
  .ep-row input[type=text],.ep-row textarea{
    width:100%;background:#212630;border:1px solid #353c48;border-radius:7px;
    padding:7px 10px;color:#dde1e8;font-size:12.5px;font-family:inherit;outline:none;transition:border-color .15s;}
  .ep-row input[type=text]:focus,.ep-row textarea:focus{border-color:var(--accent);}
  .ep-row textarea{resize:vertical;min-height:58px;line-height:1.5;}
  .ep-color-row{display:flex;align-items:center;gap:8px;}
  .ep-color-row input[type=color]{flex:none;width:36px;height:28px;padding:2px 3px;
    border:1px solid #353c48;border-radius:6px;background:#212630;cursor:pointer;}
  .ep-color-row input[type=text]{flex:1;}
  .ep-toggle-row{display:flex;align-items:center;justify-content:space-between;
    padding:9px 0;border-bottom:1px solid #252a31;}
  .ep-toggle-row span{font-size:12.5px;}
  .ep-toggle{position:relative;width:38px;height:21px;flex-shrink:0;}
  .ep-toggle input{opacity:0;width:0;height:0;position:absolute;}
  .ep-slider{position:absolute;inset:0;background:#3a404a;border-radius:21px;cursor:pointer;transition:background .2s;}
  .ep-slider:before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;
    background:#fff;border-radius:50%;transition:transform .2s;}
  .ep-toggle input:checked + .ep-slider{background:var(--accent);}
  .ep-toggle input:checked + .ep-slider:before{transform:translateX(17px);}
  .ep-toggle input:disabled + .ep-slider{opacity:.4;cursor:default;}
  .ep-export-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:9px;
    color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .15s;}
  .ep-export-btn:active{opacity:.8;}
  .ep-note{font-size:11px;color:#555;text-align:center;margin-top:7px;}
  .ep-add-block{width:100%;padding:9px;background:#1b2b1b;border:1px dashed #2a4a2a;
    border-radius:9px;color:#4caf72;font-size:12.5px;font-weight:700;cursor:pointer;
    margin-top:8px;transition:background .15s;}
  .ep-add-block:hover{background:#233323;}
  .ep-sec-swap{font-size:11px;color:#5a8fd4;background:rgba(47,127,212,.12);
    border:1px solid rgba(47,127,212,.25);border-radius:8px;padding:3px 8px;cursor:pointer;margin-left:4px;}
  .ep-sec-swap:hover{background:rgba(47,127,212,.25);}

  /* 팔레트 */
  .palette-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
  .palette-item{display:flex;align-items:center;gap:8px;background:#1e2329;
    border:1px solid #2e3545;border-radius:9px;padding:8px 10px;cursor:pointer;transition:border-color .15s;}
  .palette-item:hover{border-color:var(--primary);}
  .palette-swatches{display:flex;gap:3px;flex-shrink:0;}
  .palette-swatch{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.15);}
  .palette-name{flex:1;font-size:12px;color:#bbb;}
  .palette-del{flex:none;background:none;border:none;color:#555;font-size:14px;cursor:pointer;padding:0 2px;}
  .palette-del:hover{color:#c05050;}
  .ep-palette-save{width:100%;padding:8px;background:transparent;border:1px solid #353c48;
    border-radius:8px;color:#7ab8e8;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;}
  .ep-palette-save:hover{background:#1e2a38;}

  /* 인라인 편집 */
  body.edit-open [data-editable]{cursor:text;outline:none;border-radius:3px;}
  body.edit-open [data-editable]:hover{outline:1.5px dashed rgba(47,127,212,.5);outline-offset:3px;}
  body.edit-open [data-editable]:focus{outline:2px solid var(--primary);outline-offset:3px;
    background:rgba(47,127,212,.05);}

  /* 블록 바 */
  .block-bar{display:none;align-items:center;justify-content:space-between;
    background:rgba(47,127,212,.08);border-bottom:1px solid rgba(47,127,212,.2);
    padding:6px 14px;gap:8px;}
  body.edit-open .block-bar{display:flex;}
  .block-chip{background:rgba(47,127,212,.18);border:1px solid rgba(47,127,212,.4);
    color:#7ab8e8;font-size:12px;font-weight:700;border-radius:14px;padding:5px 13px;
    cursor:pointer;transition:background .15s;}
  .block-chip:hover{background:rgba(47,127,212,.35);color:#fff;}
  .block-actions{display:flex;gap:4px;}
  .block-act{background:#edf2f7;border:1px solid #d0d7e2;color:#5a6475;font-size:12px;
    border-radius:8px;padding:4px 9px;cursor:pointer;transition:background .15s;line-height:1.2;}
  .block-act:hover{background:#dce6f0;color:#2c3547;}
  .block-del:hover{background:#fde8e8;color:#c0392b;border-color:#f5b4b4;}

  /* 컴포넌트 피커 */
  .cp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .cp-overlay.hidden{display:none;}
  .cp-modal{background:#1a1d21;border-radius:18px;width:min(620px,96vw);max-height:82vh;
    overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.7);display:flex;flex-direction:column;}
  .cp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
    border-bottom:1px solid #2e3238;flex-shrink:0;}
  .cp-head span{color:#fff;font-weight:700;font-size:14px;}
  .cp-close{background:none;border:none;color:#666;font-size:20px;cursor:pointer;line-height:1;}
  .cp-close:hover{color:#fff;}
  .cp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:16px;}
  .cp-card{background:#212630;border:2px solid #2e3238;border-radius:12px;padding:20px 14px 16px;
    cursor:pointer;text-align:center;transition:border-color .15s,background .15s;}
  .cp-card:hover{border-color:var(--primary);background:#252e3a;}
  .cp-card.active{border-color:var(--accent)!important;background:#192c20;}
  .cp-ico{font-size:30px;margin-bottom:9px;}
  .cp-name{font-size:13px;font-weight:700;color:#dde1e8;}
  .cp-desc{font-size:11px;color:#6a7280;margin-top:5px;line-height:1.45;}
  .cp-footer{padding:12px 16px;border-top:1px solid #2e3238;flex-shrink:0;}
  .cp-add-after{width:100%;padding:9px;background:transparent;border:1px dashed #3a404a;
    color:#7ab8e8;font-size:12.5px;font-weight:700;border-radius:9px;cursor:pointer;transition:background .15s;}
  .cp-add-after:hover{background:#1e2a38;}

  /* 히스토리 패널 */
  .hp{position:fixed;top:0;left:0;height:100vh;width:320px;background:#13161a;color:#e0e2e6;
    z-index:70;display:flex;flex-direction:column;
    transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:6px 0 28px rgba(0,0,0,.5);}
  .hp.open{transform:translateX(0);}
  .hp-header{display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px;background:#0e1114;border-bottom:1px solid #2e3238;flex-shrink:0;}
  .hp-header h3{margin:0;font-size:13px;font-weight:700;color:#fff;}
  .hp-close{background:none;border:none;color:#777;font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
  .hp-close:hover{color:#fff;}
  .hp-save-row{padding:11px 14px;border-bottom:1px solid #2e3238;display:flex;gap:8px;flex-shrink:0;}
  .hp-name-input{flex:1;background:#1e2329;border:1px solid #353c48;border-radius:8px;
    padding:7px 10px;color:#dde1e8;font-size:12.5px;font-family:inherit;outline:none;}
  .hp-name-input:focus{border-color:var(--accent);}
  .hp-save-btn{flex:none;background:var(--accent);border:none;border-radius:8px;
    color:#fff;font-size:12.5px;font-weight:700;padding:0 14px;cursor:pointer;}
  .hp-list{flex:1;overflow-y:auto;padding:10px 14px;}
  .hp-empty{text-align:center;color:#555;font-size:13px;padding:30px 10px;line-height:1.8;}
  .hp-item{background:#1a1f27;border:1px solid #2a3040;border-radius:11px;
    padding:14px;margin-bottom:10px;transition:border-color .15s;}
  .hp-item:hover{border-color:#3a4558;}
  .hp-item.hp-orig{border-color:#3a3020;}

<script>
(function(){
  /* =========================================================
     0. 초기화
  ========================================================= */

  var ids = Object.keys(reg);
  if(!ids.length){
    document.getElementById('app').innerHTML = '<p style="padding:40px;text-align:center;">캠페인 데이터가 없습니다.</p>';
    return;
  }
  var qid = new URLSearchParams(location.search).get('c');
  var C = reg[qid] || reg[ids[0]];
  var storageKey = 'hb_draft_v2_' + C.meta.id;
  var draft;
  try {
    var _saved = localStorage.getItem(storageKey);
    draft = _saved ? JSON.parse(_saved) : clone(C);
  } catch(e){ draft = clone(C); }

  function clone(o){ return JSON.parse(JSON.stringify(o)); }

  /* =========================================================
     1. 테마
  ========================================================= */
  function applyTheme(t){
    t = t || {};
    var r = document.documentElement.style;
    var m = {primary:'--primary',accent:'--accent',heroFrom:'--hero-from',heroTo:'--hero-to',band1:'--band1',band2:'--band2'};
    Object.keys(m).forEach(function(k){ if(t[k]) r.setProperty(m[k], t[k]); });

  document.title = draft.meta.name + ' · 해피빈 프로토타입';
  document.getElementById('tbLabel').innerHTML = '<b>'+esc(draft.meta.name)+'</b> · '+esc(draft.meta.status||'');

  /* =========================================================
     2. 유틸
  ========================================================= */
  function esc(s){
    return String(s==null?'':s).replace(/[&<>"]/g,function(c){
      return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }
  function pre(s){ return esc(s); }
  function bandCls(b){ return b==='band1'?'b-band1':b==='band2'?'b-band2':''; }

  function imgHtml(src, note, h, key){
    var k = 'data-imgkey="'+esc(key||'')+'"';
    if(src) return '<div class="img-wrapper" '+k+'><img class="img-real" src="'+esc(src)+'" alt=""></div>';
    return '<div class="img-ph" '+k+' style="min-height:'+(h||180)+'px;">'
      +'<div class="img-drop-hint"><div class="ico">🖼</div>'
      +'<div>'+esc(note||'이미지 영역')+'</div></div></div>';
  }
  function planHtml(tag, txt){
    if(!txt) return '';
    return '<div class="plan-note"><div class="inner">'
      +'<span class="plan-tag">'+esc(tag)+'</span>'
      +'<p class="plan-txt">'+esc(txt)+'</p></div></div>';
  }
  function specHtml(tag, s){
    if(!s) return '';
    var a = (s.assets&&s.assets.length)
      ? '<h4>필요 에셋</h4><ul>'+s.assets.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>':'' ;

    var n  = s.note ? '<div style="margin-top:6px;color:#8a4d0f;">※ '+esc(s.note)+'</div>' : '';
    return '<div class="spec-sheet"><div class="spec-card"><h4>['+esc(tag)+'] 제작 스펙</h4>'+a+it+n+'</div></div>';
  }
  function edAttr(key){ return ' data-editable data-key="'+esc(key)+'" '; }

  var _toastTimer;
  function toast(msg, type){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show'+(type?' '+type:'');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2600);
  }

  /* =========================================================
     3. 블록 타입 정의
  ========================================================= */
  var MISSION_TYPES = [
    {type:'quiz',     ico:'🎯', name:'참여형 퀴즈',   desc:'정답/오답 선택'},

    cta:      {type:'cta',band:'',title:'지금 참여하세요',cta:'참여하기',bean:''},
    video:    {type:'video',band:'band1',title:'영상으로 만나보세요',sub:'',

    for(var i=0;i<MISSION_TYPES.length;i++){
      if(MISSION_TYPES[i].type===type) return MISSION_TYPES[i];
    }
    return MISSION_TYPES[6];

  /* =========================================================
     4. 미션 렌더러
  ========================================================= */
  var MR = {

        +(m.bean?'<div style="margin-top:26px;"><span class="bean">'+esc(m.bean)+'</span></div>':'')

        +'<button class="pill-btn cta-btn" style="display:none;" data-bean="'+esc(m.bean||'')+'" data-midx="'+i+'">'+esc(m.cta||'확인했어요! 콩 받기')+'</button>'
        +'</div></div></section>';
    },
    story: function(m, i){
      return '<section class="band '+bandCls(m.band)+'" data-section="missions.'+i+'">'

        +(m.cta?'<div><button class="pill-btn cta-btn" data-bean="'+esc(m.bean||'')+'" data-midx="'+i+'">'+esc(m.cta)+'</button></div>':'')
        +'</div></section>';

    channels: function(m, i){
      var cards = (m.items||[]).map(function(it,ii){

    video: function(m, i){
      return '<section class="band '+bandCls(m.band)+'" data-section="missions.'+i+'">'

        +'<div class="container center stack">'
        +(m.title?'<div class="h2 pre"'+edAttr('missions.'+i+'.title')+'>'+pre(m.title)+'</div>':'')
        +(m.sub?'<div class="lead pre"'+edAttr('missions.'+i+'.sub')+'>'+pre(m.sub)+'</div>':'')
        +'<div class="img-ph" style="min-height:300px;">▶ 영상: '+esc(m.videoNote||m.videoUrl||'유튜브 영상')+'</div>'
        +(m.bean?'<div><span class="bean">'+esc(m.bean)+'</span></div>':'')

        +'</div></section>';
    },
    cards: function(m, i){
      var cards = (m.items||[]).map(function(it,ii){
        return '<div class="chan-card">'
          +(it.badge?'<span class="chan-badge">'+esc(it.badge)+'</span>':'')
          +'<div class="chan-title pre"'+edAttr('missions.'+i+'.items.'+ii+'.title')+'>'+pre(it.title)+'</div>'
          +'<div class="chan-desc pre"'+edAttr('missions.'+i+'.items.'+ii+'.desc')+'>'+pre(it.desc)+'</div></div>';

      return '<section class="band '+bandCls(m.band)+'" data-section="missions.'+i+'">'

        +'<div class="container center">'
        +(m.head?'<div class="h2 pre"'+edAttr('missions.'+i+'.head')+'>'+pre(m.head)+'</div>':'')

        +'</div></section>';

  function missionBar(m, i){
    var ti = getMissionTypeInfo(m.type);

      +(len>1?'<button class="block-act block-del" data-delidx="'+i+'" title="삭제">✕</button>':'')
      +'</div></div>';
  }

  /* =========================================================
     5. 렌더
  ========================================================= */
  function render(){
    var d = draft, mm = d.meta;

      +'<div class="gnb-logo"><span class="n">N</span> 해피빈</div>'

    var he = d.hero;

  function bindImgDrop(ph){
    ph.addEventListener('dragover',  function(e){ e.preventDefault(); ph.classList.add('drag-over'); });
    ph.addEventListener('dragleave', function(){ ph.classList.remove('drag-over'); });
    ph.addEventListener('drop', function(e){
      e.preventDefault(); ph.classList.remove('drag-over');
      var f = e.dataTransfer.files[0];
      if(f && f.type.startsWith('image/')) readImg(f, ph);
    });
    ph.addEventListener('click', function(){
      if(!document.body.classList.contains('edit-open')) return;
      var inp = document.createElement('input');
      inp.type='file'; inp.accept='image/*';
      inp.onchange = function(){ if(inp.files[0]) readImg(inp.files[0], ph); };
      inp.click();
    });
  }
  function readImg(file, ph){
    var reader = new FileReader();
    reader.onload = function(e){
      var url = e.target.result;
      var key = ph.dataset.imgkey;
      var img = document.createElement('img');
      img.className = 'img-real'; img.src = url;
      var wrap = document.createElement('div');
      wrap.className = 'img-wrapper'; wrap.dataset.imgkey = key;
      wrap.appendChild(img);
      ph.parentNode.replaceChild(wrap, ph);
      setVal(key, url);
      save();
      toast('✅ 이미지 업로드 완료!');
    };
    reader.readAsDataURL(file);
  }

  function getVal(path){
    var parts = path.split('.');
    var cur = draft;
    for(var i=0;i<parts.length;i++){
      if(cur==null) return undefined;
      cur = /^\d+$/.test(parts[i]) ? cur[+parts[i]] : cur[parts[i]];
    }
    return cur;
  }
  function setVal(path, val){
    var parts = path.split('.');
    var cur = draft;
    for(var i=0;i<parts.length-1;i++){
      var k = parts[i];
      cur = /^\d+$/.test(k) ? cur[+k] : cur[k];
      if(cur==null) return;
    }
    var last = parts[parts.length-1];
    if(/^\d+$/.test(last)) cur[+last] = val;
    else cur[last] = val;
  }

    _dirty = true;

    _saveTimer = setTimeout(save, 1500);

    } catch(e){}
  }

  /* =========================================================
     16. Undo / Redo
  ========================================================= */
  var _undoStack = [], _redoStack = [];
  var _undoReady = false;
  var MAX_UNDO = 40;

  function recordUndo(){
    if(!_undoReady) return;
    _undoStack.push(clone(draft));
    if(_undoStack.length > MAX_UNDO) _undoStack.shift();
    _redoStack = [];
    updateUndoUI();
  }
  function undo(){
    if(!_undoStack.length) return;
    _redoStack.push(clone(draft));
    draft = _undoStack.pop();
    localStorage.setItem(storageKey, JSON.stringify(draft));
    applyTheme(draft.theme);
    render();
    syncColorPickers();
    updateUndoUI();
    toast('실행 취소');
  }
  function redo(){
    if(!_redoStack.length) return;
    _undoStack.push(clone(draft));
    draft = _redoStack.pop();
    localStorage.setItem(storageKey, JSON.stringify(draft));
    applyTheme(draft.theme);
    render();
    syncColorPickers();
    updateUndoUI();
    toast('다시 실행');
  }
  function updateUndoUI(){
    var u = document.getElementById('undoBtn');
    var r = document.getElementById('redoBtn');
    if(u) u.classList.toggle('on', _undoStack.length > 0);
    if(r) r.classList.toggle('on', _redoStack.length > 0);
  }
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('redoBtn').addEventListener('click', redo);
  document.addEventListener('keydown', function(e){
    if((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key==='z'){ e.preventDefault(); undo(); }
    if((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.shiftKey&&e.key==='Z'))){ e.preventDefault(); redo(); }
  });

    var def = clone(MISSION_DEFAULTS[newType] || {type:newType});
    ['bean','cta','band','plan'].forEach(function(k){
      if(old[k] !== undefined && old[k] !== null) def[k] = old[k];
    });
    draft.missions[idx] = def;
    markDirty(); save(); render();
    toast(getMissionTypeInfo(newType).name+'으로 교체됐어요');
  }
  function addMission(afterIdx){
    recordUndo();
    var newM = clone(MISSION_DEFAULTS.story);
    newM.band = 'band1';
    if(afterIdx === undefined || afterIdx < 0) draft.missions.push(newM);
    else draft.missions.splice(afterIdx+1, 0, newM);
    markDirty(); save(); render();
    toast('스토리 블록 추가됨');
  }
  function removeMission(idx){
    if(draft.missions.length <= 1){ toast('마지막 블록은 삭제할 수 없어요'); return; }
    recordUndo();
    draft.missions.splice(idx, 1);
    markDirty(); save(); render();
    toast('블록이 삭제됐어요');
  }
  function moveMission(idx, dir){
    var arr = draft.missions;
    var ni = idx + dir;
    if(ni < 0 || ni >= arr.length) return;
    recordUndo();
    var tmp = arr[idx]; arr[idx] = arr[ni]; arr[ni] = tmp;
    markDirty(); save(); render();
  }
  function copyMission(idx){
    recordUndo();
    var newM = clone(draft.missions[idx]);
    draft.missions.splice(idx+1, 0, newM);
    markDirty(); save(); render();
    toast('블록이 복사됐어요');
  }

  /* =========================================================
     19. 컴포넌트 피커
  ========================================================= */
  var _cpTargetIdx = -1;
  function showCompPicker(idx){
    _cpTargetIdx = idx;
    var m = draft.missions[idx];
    var grid = document.getElementById('cpGrid');
    grid.innerHTML = MISSION_TYPES.map(function(t){
      var active = (m.type === t.type) ? ' active' : '';
      return '<div class="cp-card'+active+'" data-cptype="'+t.type+'">'
        +'<div class="cp-ico">'+t.ico+'</div>'
        +'<div class="cp-name">'+t.name+'</div>'
        +'<div class="cp-desc">'+t.desc+'</div>'
        +'</div>';
    }).join('');
    document.getElementById('compPicker').classList.remove('hidden');
  }
  function closeCompPicker(){
    document.getElementById('compPicker').classList.add('hidden');
    _cpTargetIdx = -1;
  }
  document.getElementById('cpClose').addEventListener('click', closeCompPicker);
  document.getElementById('compPicker').addEventListener('click', function(e){
    if(e.target === document.getElementById('compPicker')) closeCompPicker();
  });
  document.getElementById('cpGrid').addEventListener('click', function(e){
    var card = e.target.closest('[data-cptype]');
    if(!card || _cpTargetIdx < 0) return;
    swapMissionType(_cpTargetIdx, card.dataset.cptype);
    closeCompPicker();
  });
  document.getElementById('cpAddAfter').addEventListener('click', function(){
    var idx = _cpTargetIdx;
    closeCompPicker();
    addMission(idx);
  });

  /* =========================================================
     20. 팔레트 프리셋
  ========================================================= */
  var paletteKey = 'hb_palettes_v1';
  var BUILTIN_PALETTES = [
    {id:'hb-default',  builtin:true, name:'해피빈 기본',
     colors:{primary:'#2f7fd4',accent:'#16c265',heroFrom:'#cfe7fb',heroTo:'#eef7e9',band1:'#eaf4fd',band2:'#eaf7ef'}},
    {id:'warm-orange', builtin:true, name:'따뜻한 주황',
     colors:{primary:'#d4612f',accent:'#f5a623',heroFrom:'#fff3e0',heroTo:'#fff8ec',band1:'#fff8f0',band2:'#fffbf2'}},
    {id:'calm-purple', builtin:true, name:'차분한 보라',
     colors:{primary:'#6b4fa8',accent:'#9c6fdb',heroFrom:'#f3e5f5',heroTo:'#ede7f6',band1:'#f3e5f5',band2:'#ede7f6'}},
    {id:'forest-green',builtin:true, name:'포레스트 그린',
     colors:{primary:'#2e7d52',accent:'#43a047',heroFrom:'#e8f5e9',heroTo:'#f1f8e9',band1:'#e8f5e9',band2:'#f1f8e9'}}
  ];
  function getUserPalettes(){
    try{ return JSON.parse(localStorage.getItem(paletteKey)||'[]'); }catch(e){ return []; }
  }
  function putUserPalettes(arr){ localStorage.setItem(paletteKey, JSON.stringify(arr)); }
  function applyPalette(colors){
    recordUndo();
    if(!draft.theme) draft.theme = {};
    var keys = Object.keys(colors);
    for(var ki=0;ki<keys.length;ki++) draft.theme[keys[ki]] = colors[keys[ki]];
    applyTheme(draft.theme);
    syncColorPickers();
    markDirty();
    toast('팔레트 적용됨');
  }
  function renderPaletteList(){
    var el = document.getElementById('paletteList');
    if(!el) return;
    var user = getUserPalettes();
    var all = BUILTIN_PALETTES.concat(user);
    el.innerHTML = all.map(function(p){
      var swatches = ['primary','accent','heroFrom','heroTo','band1','band2'].map(function(k){
        return '<div class="palette-swatch" style="background:'+esc(p.colors[k]||'#ccc')+'"></div>';
      }).join('');
      return '<div class="palette-item" data-palid="'+esc(p.id)+'">'
        +'<div class="palette-swatches">'+swatches+'</div>'
        +'<span class="palette-name">'+esc(p.name)+'</span>'
        +(!p.builtin?'<button class="palette-del" data-paldel="'+esc(p.id)+'" title="삭제">X</button>':'')
        +'</div>';
    }).join('');
    el.querySelectorAll('.palette-item').forEach(function(item){
      item.addEventListener('click', function(e){
        if(e.target.closest('[data-paldel]')) return;
        var pid = item.dataset.palid;
        for(var ai=0;ai<all.length;ai++){
          if(all[ai].id===pid){ applyPalette(all[ai].colors); break; }
        }
      });
    });
    el.querySelectorAll('[data-paldel]').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        putUserPalettes(getUserPalettes().filter(function(p){ return p.id!==btn.dataset.paldel; }));
        renderPaletteList();
      });
    });
  }
  document.getElementById('paletteSaveBtn').addEventListener('click', function(){
    var name = prompt('팔레트 이름을 입력하세요');
    if(!name) return;
    var colors = {};
    colorMap.forEach(function(f){
      colors[f.id] = (draft.theme||{})[f.id] || getComputedStyle(document.documentElement).getPropertyValue(f.css).trim();
    });
    var arr = getUserPalettes();
    arr.unshift({id:'u_'+Date.now(), name:name.trim(), colors:colors});
    putUserPalettes(arr);
    renderPaletteList();
    toast('팔레트 저장됨');
  });

  /* =========================================================
     21. 버전 히스토리
  ========================================================= */
  var snapKey = 'hb_snaps_v1_' + C.meta.id;
  var MAX_SNAPS = 40;
  var _hpPreviewSnapId = null;

  function getSnaps(){
    try{ return JSON.parse(localStorage.getItem(snapKey)||'[]'); }catch(e){ return []; }
  }
  function putSnaps(arr){ localStorage.setItem(snapKey, JSON.stringify(arr)); }

  function saveSnapshot(name){
    var snaps = getSnaps();
    var nm = (name||'').trim() || ('스냅샷 '+new Date().toLocaleTimeString('ko-KR'));
    snaps.unshift({
      id: Date.now(),
      name: nm,
      ts: new Date().toISOString(),
      missionCount: (draft.missions||[]).length,
      types: (draft.missions||[]).map(function(m){ return m.type; }),
      data: clone(draft)
    });
    if(snaps.length > MAX_SNAPS) snaps = snaps.slice(0, MAX_SNAPS);
    putSnaps(snaps);
    renderHpList();
    return nm;
  }
  function deleteSnapshot(id){
    putSnaps(getSnaps().filter(function(s){ return s.id !== id; }));
    renderHpList();
  }
  function restoreSnapshot(id){
    var snap = null;
    var snaps = getSnaps();
    for(var i=0;i<snaps.length;i++){ if(snaps[i].id===id){ snap=snaps[i]; break; } }
    if(!snap) return;
    draft = clone(snap.data);
    localStorage.setItem(storageKey, JSON.stringify(draft));
    applyTheme(draft.theme);
    render();
    syncColorPickers();
    toast(snap.name+' 버전으로 복원됐어요');
  }
  function fmtTs(iso){
    try{
      var d2 = new Date(iso), now = new Date();
      var diff = Math.floor((now - d2) / 1000);
      if(diff < 60) return '방금 전';
      if(diff < 3600) return Math.floor(diff/60)+'분 전';
      if(diff < 86400) return Math.floor(diff/3600)+'시간 전';
      if(diff < 86400*7) return Math.floor(diff/86400)+'일 전';
      return d2.toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }catch(e){ return ''; }
  }
  function renderHpList(){
    var list = document.getElementById('hpList');
    var footer = document.getElementById('hpFooter');
    if(!list) return;
    var snaps = getSnaps();
    if(!snaps.length){
      list.innerHTML = '<div class="hp-empty">저장된 버전이 없어요.<br>이름을 입력하고 저장해보세요.</div>';
      if(footer) footer.textContent = '';
      return;
    }
    list.innerHTML = snaps.map(function(s, idx){
      var isOrig = idx === snaps.length-1;
      var typeChips = (s.types||[]).map(function(t){ return getMissionTypeInfo(t).ico; }).join(' ');
      return '<div class="hp-item'+(isOrig?' hp-orig':'')+'" data-snapid="'+s.id+'">'
        +'<div class="hp-item-name">'+esc(s.name)+(isOrig?' <span class="hp-orig-badge">최초</span>':'')+'</div>'
        +'<div class="hp-item-ts">'+fmtTs(s.ts)+'</div>'
        +'<div class="hp-item-meta">블록 '+(s.missionCount||'?')+'개 '+typeChips+'</div>'
        +'<div class="hp-item-acts">'
        +'<button class="hp-restore" data-rid="'+s.id+'">복원</button>'
        +'<button class="hp-preview" data-pvid="'+s.id+'">미리보기</button>'
        +(isOrig?'':'<button class="hp-del" data-did="'+s.id+'">X</button>')
        +'</div></div>';
    }).join('');
    list.querySelectorAll('[data-rid]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var snapId = +btn.dataset.rid;
        var snaps2 = getSnaps();
        var found = null;
        for(var i=0;i<snaps2.length;i++){ if(snaps2[i].id===snapId){ found=snaps2[i]; break; } }
        if(!confirm((found?found.name:'이 버전')+' 버전으로 복원할까요?\n현재 작업 내용이 덮어씌워집니다.')) return;
        restoreSnapshot(snapId);
        closeHp();
      });
    });
    list.querySelectorAll('[data-pvid]').forEach(function(btn){
      btn.addEventListener('click', function(){ openPreview(+btn.dataset.pvid); });
    });
    list.querySelectorAll('[data-did]').forEach(function(btn){
      btn.addEventListener('click', function(){ deleteSnapshot(+btn.dataset.did); });
    });
    if(footer) footer.textContent = '총 '+snaps.length+'개 / 최대 '+MAX_SNAPS+'개';
  }
  function openPreview(id){
    var snap = null;
    var snaps = getSnaps();
    for(var i=0;i<snaps.length;i++){ if(snaps[i].id===id){ snap=snaps[i]; break; } }
    if(!snap) return;
    _hpPreviewSnapId = id;
    var label = document.getElementById('hpPreviewLabel');
    if(label) label.textContent = '미리보기: '+snap.name;
    var frame = document.getElementById('hpPreviewFrame');
    var html2 = document.documentElement.outerHTML;
    var inject = '<script>var __PREVIEW_DATA__='+JSON.stringify(snap.data)+';<\/script>';
    html2 = html2.replace('<script src="campaigns/', inject+'<script src="campaigns/');
    html2 = html2.replace(
      'draft = _saved ? JSON.parse(_saved) : clone(C);',
      'draft = window.__PREVIEW_DATA__ ? JSON.parse(JSON.stringify(window.__PREVIEW_DATA__)) : (_saved ? JSON.parse(_saved) : clone(C));'
    );
    html2 = html2.replace('.hp{position:fixed', '.hp{display:none!important;position:fixed');
    html2 = html2.replace('.ep{position:fixed', '.ep{display:none!important;position:fixed');
    html2 = html2.replace('.topbar{position:sticky', '.topbar{display:none!important;position:sticky');
    var blob = new Blob([html2], {type:'text/html'});
    frame.src = URL.createObjectURL(blob);
    document.getElementById('hpPreviewOverlay').classList.remove('hidden');
  }
  document.getElementById('hpPreviewClose').addEventListener('click', function(){
    document.getElementById('hpPreviewOverlay').classList.add('hidden');
    document.getElementById('hpPreviewFrame').src = 'about:blank';
    _hpPreviewSnapId = null;
  });
  document.getElementById('hpPreviewRestore').addEventListener('click', function(){
    if(_hpPreviewSnapId === null) return;
    var snap = null;
    var snaps = getSnaps();
    for(var i=0;i<snaps.length;i++){ if(snaps[i].id===_hpPreviewSnapId){ snap=snaps[i]; break; } }
    if(!snap || !confirm(snap.name+' 버전으로 복원할까요?')) return;
    restoreSnapshot(_hpPreviewSnapId);
    document.getElementById('hpPreviewOverlay').classList.add('hidden');
    document.getElementById('hpPreviewFrame').src = 'about:blank';
    closeHp();
  });
  function openHp(){ renderHpList(); document.getElementById('histPanel').classList.add('open'); }
  function closeHp(){ document.getElementById('histPanel').classList.remove('open'); }
  document.getElementById('histToggle').addEventListener('click', function(){
    if(document.getElementById('histPanel').classList.contains('open')) closeHp();
    else openHp();
  });
  document.getElementById('hpClose').addEventListener('click', closeHp);
  document.getElementById('hpSaveBtn').addEventListener('click', function(){
    var inp = document.getElementById('hpNameInput');
    var nm = saveSnapshot(inp.value);
    inp.value = '';
    toast(nm+' 저장됨');
  });
  document.getElementById('hpNameInput').addEventListener('keydown', function(e){
    if(e.key==='Enter') document.getElementById('hpSaveBtn').click();
  });

  (function(){
    if(!getSnaps().length) saveSnapshot('원본 시안 (자동)');
  })();

  /* =========================================================
     22. 초기 렌더
  ========================================================= */
  render();
  _undoReady = true;
  renderPaletteList();
  updateUndoUI();

})();
</script>
</body>
</html>
