<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해피빈 캠페인 프로토타입</title>
<style>
  :root{
    --font-body:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    --font-nanum-gothic:"Nanum Gothic",-apple-system,sans-serif;
    --font-nanum-myeongjo:"Nanum Myeongjo",Georgia,serif;
    --primary:#2f7fd4; --accent:#16c265;
    --hero-from:#cfe7fb; --hero-to:#eef7e9;
    --band1:#eaf4fd; --band2:#eaf7ef;
    --ink:#2c2f33; --body:#5b6168; --muted:#9aa0a6;
    --card:#fff; --line:#eceef0; --skeleton:#e3e6ea;
    --w:960px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:#fff;color:var(--body);
    font-family:var(--font-body,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif);
    -webkit-font-smoothing:antialiased;}
  .container{max-width:var(--w);margin:0 auto;padding:0 24px;}
  .band{padding:clamp(52px,7vw,84px) 0;}
  .band.tight{padding:clamp(28px,4vw,44px) 0;}
  .band.b-hero{background:linear-gradient(180deg,var(--hero-from),var(--hero-to));}
  .band.b-band1{background:var(--band1);}
  .band.b-band2{background:var(--band2);}
  .center{text-align:center;}
  .pre{white-space:pre-line;}
  .h1{font-size:clamp(28px,4.6vw,42px);font-weight:800;line-height:1.34;color:var(--ink);}
  .h2{font-size:clamp(22px,3.4vw,30px);font-weight:800;line-height:1.36;color:var(--ink);}
  .lead{font-size:clamp(15px,1.8vw,17px);line-height:1.68;}
  .eyebrow{display:inline-block;background:#fff;color:var(--primary);border:1px solid var(--line);
    font-size:13px;font-weight:700;padding:7px 16px;border-radius:20px;}
  .stack>*+*{margin-top:18px;}

  .img-ph{border:2px dashed #c4ccd2;border-radius:16px;background:#f6f8fa;
    display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--muted);font-size:13px;min-height:150px;padding:20px;line-height:1.6;
    position:relative;transition:border-color .15s,background .15s;}
  .img-ph.droppable{cursor:pointer;}
  .img-ph.droppable:hover,.img-ph.drag-over{border-color:var(--primary);background:#f0f6ff;}
  .img-ph.drag-over{border-color:var(--accent);background:#f0faf5;}
  .img-drop-hint{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
  .img-drop-hint .ico{font-size:28px;}
  .img-real{border-radius:16px;width:100%;display:block;}
  .b-hero .img-wrapper{margin-top:32px;}
  .b-hero .img-wrapper .img-real{border-radius:0;width:100%;max-height:520px;object-fit:cover;}
  .b-hero .img-ph{border-radius:0;margin-top:32px;min-height:480px;border-left:none;border-right:none;border-radius:0;}

  .pill-btn{display:inline-flex;align-items:center;justify-content:center;min-height:50px;
    padding:0 34px;background:var(--accent);color:#fff;border-radius:28px;font-weight:700;
    font-size:16px;box-shadow:0 6px 14px rgba(0,0,0,.12);cursor:pointer;border:none;
    transition:transform .1s,opacity .15s;}
  .pill-btn:active{transform:scale(.97);}
  .pill-btn:disabled{opacity:.6;cursor:default;transform:none;}
  .pill-btn.ghost{background:#fff;color:var(--primary);border:1.5px solid var(--primary);
    box-shadow:none;min-height:42px;padding:0 24px;font-size:14px;}
  .bean{display:inline-block;background:#fff;border:1px solid var(--line);color:var(--body);
    font-size:13px;font-weight:700;padding:7px 16px;border-radius:18px;}
  .bean:before{content:"🌱 ";}

  .bubble{position:relative;display:inline-block;background:#fff;border:1px solid var(--line);
    border-radius:18px;padding:22px 30px;max-width:540px;box-shadow:0 8px 20px rgba(0,0,0,.05);}
  .bubble:after{content:"";position:absolute;left:50%;bottom:-11px;transform:translateX(-50%) rotate(45deg);
    width:20px;height:20px;background:#fff;border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
  .qcard{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--line);
    border-radius:16px;padding:20px 22px;box-shadow:0 4px 12px rgba(0,0,0,.04);text-align:left;
    cursor:pointer;transition:border-color .15s,background .15s;}
  .qcard:hover{border-color:var(--primary);background:#f8fbff;}
  .qcard .ic{flex:none;width:48px;height:48px;border-radius:50%;background:var(--band1);transition:background .2s;}
  .qcard.correct-reveal{border:2px solid #16c265!important;background:#f0faf5!important;}
  .qcard.correct-reveal .ic{background:#16c265!important;}
  .qcard.wrong-reveal{border:2px solid #e05050!important;background:#fff5f5!important;}
  .qcard.wrong-reveal .ic{background:#e05050!important;}
  .quiz-answered .qcard{pointer-events:none;}

  .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .chan-card{background:#fff;border:1px solid var(--line);border-radius:18px;
    padding:28px 20px;text-align:center;box-shadow:0 6px 16px rgba(0,0,0,.05);}
  .chan-badge{display:inline-block;background:var(--primary);color:#fff;font-size:12.5px;
    font-weight:700;padding:6px 14px;border-radius:16px;}
  .chan-title{font-size:17px;font-weight:800;color:var(--ink);margin-top:14px;}
  .chan-desc{font-size:14px;line-height:1.6;margin-top:10px;}

  .social-row{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;}
  .social{width:44px;height:44px;border-radius:12px;background:var(--skeleton);
    display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa;overflow:hidden;
    cursor:pointer;transition:opacity .15s;}
  .social:hover{opacity:.75;}
  .amount{font-size:clamp(30px,5vw,46px);font-weight:800;color:var(--primary);}

  .gnb{background:#fff;border-bottom:1px solid #eef0f2;}
  .gnb-inner{display:flex;align-items:center;height:70px;gap:20px;}
  .gnb-logo{flex:none;display:flex;align-items:center;gap:9px;font-size:21px;font-weight:800;color:#03c75a;}
  .gnb-logo .n{width:28px;height:28px;border-radius:7px;background:#03c75a;color:#fff;font-size:17px;
    font-weight:800;display:flex;align-items:center;justify-content:center;}
  .gnb-menu{flex:1;display:flex;justify-content:center;gap:48px;font-size:17px;color:#333;font-weight:700;}
  .gnb-menu .on{color:#03c75a;}
  .gnb-right{flex:none;display:flex;align-items:center;gap:7px;font-size:16px;color:#333;font-weight:700;}
  .gnb-right svg{width:19px;height:19px;stroke:#555;fill:none;}
  .ft{background:#f4f6f7;color:#9098a0;padding:40px 0;font-size:12.5px;line-height:1.8;}
  .ft b{color:#6b7178;font-weight:700;}

  .floating{position:fixed;top:96px;right:24px;z-index:55;background:var(--primary);border-radius:18px;
    padding:13px 22px;text-align:center;box-shadow:0 8px 18px rgba(0,0,0,.25);color:#fff;}
  .floating .lbl{font-size:12px;font-weight:700;opacity:.9;}
  .floating .val{font-size:23px;font-weight:800;color:#f1ff3d;margin-top:3px;}
  .floating .val small{font-size:13px;color:#fff;font-weight:700;margin-left:3px;}
  .floating .stamp{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.25);
    margin:8px auto 0;border:2px dashed rgba(255,255,255,.6);}

  .cmt{border-top:2px solid #eef0f2;padding-top:28px;}
  .cmt-head{font-size:15px;color:var(--ink);font-weight:700;margin-bottom:16px;}
  .cmt-head b{color:var(--accent);}
  .cmt-write{display:flex;gap:10px;margin-bottom:6px;}
  .cmt-input{flex:1;border:1px solid var(--line);border-radius:12px;background:#fafbfc;
    padding:16px 18px;color:var(--ink);font-size:14px;min-height:62px;resize:vertical;font-family:inherit;outline:none;}
  .cmt-input:focus{border-color:var(--accent);}
  .cmt-submit{flex:none;display:flex;align-items:center;background:var(--accent);color:#fff;
    font-weight:700;border-radius:12px;padding:0 26px;font-size:15px;cursor:pointer;border:none;}
  .cmt-submit:active{opacity:.85;}
  .cmt-item{display:flex;gap:14px;padding:20px 2px;border-top:1px solid #eef0f2;animation:fadeIn .3s ease;}
  .cmt-item .av{flex:none;width:40px;height:40px;border-radius:50%;background:var(--skeleton);}
  .cmt-name{font-weight:700;color:var(--ink);font-size:14px;}
  .cmt-date{color:var(--muted);font-size:12.5px;margin-left:8px;}
  .cmt-text{font-size:14px;line-height:1.6;margin-top:6px;}
  .cmt-act{margin-top:10px;font-size:12.5px;color:var(--muted);display:flex;gap:16px;}
  .more{display:inline-block;border:1px solid var(--line);border-radius:24px;
    padding:13px 30px;color:var(--muted);font-size:14px;background:#fff;cursor:pointer;}

  .plan-note{max-width:var(--w);margin:0 auto;padding:0 24px;display:none;}
  .plan-note .inner{display:flex;gap:10px;align-items:flex-start;margin:18px 0 0;flex-wrap:wrap;}
  .plan-tag{flex:none;background:#3c4148;color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:6px;}
  .plan-txt{margin:0;font-size:13px;line-height:1.6;color:#4a505a;background:#f1f3f5;
    border:1px solid #e3e6ea;border-radius:8px;padding:8px 13px;flex:1;min-width:240px;}
  body.mode-plan .plan-note{display:block;}
  .spec-sheet{max-width:var(--w);margin:0 auto;padding:0 24px;display:none;}
  .spec-card{border:1px solid #dfe3e8;border-left:4px solid var(--primary);border-radius:8px;
    background:#fbfcfd;padding:16px 20px;margin:14px 0 0;font-size:13px;line-height:1.7;color:#3c4148;}
  .spec-card h4{margin:0 0 8px;font-size:13px;color:var(--primary);}
  .spec-card ul{margin:4px 0;padding-left:18px;}
  body.mode-spec .spec-sheet{display:block;}
  .doc-head{display:none;background:#23262b;color:#e8eaed;padding:34px 0;}
  .doc-head h1{margin:0 0 8px;font-size:22px;}
  .doc-head .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 24px;
    font-size:13.5px;line-height:1.7;margin-top:14px;}
  .doc-head .grid b{color:#fff;}
  body.mode-plan .doc-head,body.mode-spec .doc-head{display:block;}

  /* 툴바 */
  .topbar{position:sticky;top:0;z-index:60;background:#1f2226;color:#eee;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:10px 18px;font-size:13px;flex-wrap:wrap;}
  .topbar .label b{color:#fff;}
  .seg{display:flex;background:#33373c;border-radius:20px;padding:3px;}
  .seg button{border:0;background:transparent;color:#bbb;font-size:12.5px;font-weight:700;
    padding:6px 16px;border-radius:16px;cursor:pointer;}
  .seg button.on{background:var(--accent);color:#fff;}
  .tb-btn{background:#33373c;border:1px solid #4a4f55;color:#fff;padding:7px 13px;border-radius:20px;
    font-size:12.5px;cursor:pointer;transition:background .15s;}
  .tb-btn.active{background:var(--accent);border-color:var(--accent);}
  
  .save-dot{width:7px;height:7px;border-radius:50%;background:#f1ff3d;display:inline-block;
    margin-left:4px;opacity:0;transition:opacity .3s;vertical-align:middle;}
  .save-dot.show{opacity:1;}
  .tb-undo,.tb-redo{opacity:.4;pointer-events:none;}
  .tb-undo.on,.tb-redo.on{opacity:1;pointer-events:auto;}

  /* 에디터 패널 */
  .ep{position:fixed;top:0;right:0;height:100vh;width:300px;background:#1a1d21;color:#e0e2e6;
    z-index:70;display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:-6px 0 28px rgba(0,0,0,.45);}
  .ep.open{transform:translateX(0);}
  .ep-header{display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px;background:#13161a;border-bottom:1px solid #2e3238;flex-shrink:0;}
  .ep-header h3{margin:0;font-size:13px;font-weight:700;color:#fff;}
  .ep-close{background:none;border:none;color:#777;font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
  .ep-close:hover{color:#fff;}
  .ep-tabs{display:flex;background:#13161a;border-bottom:1px solid #2e3238;flex-shrink:0;}
  .ep-tabs button{flex:1;border:none;background:none;color:#777;font-size:12px;font-weight:700;
    padding:10px 4px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .ep-tabs button.on{color:#fff;border-bottom-color:var(--accent);}
  .ep-body{flex:1;overflow-y:auto;padding:14px;}
  .ep-body.hidden{display:none;}
  .ep-group{margin-bottom:18px;}
  .ep-group-label{font-size:10.5px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.07em;
    margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #252a31;}
  .ep-row{margin-bottom:10px;}
  .ep-row label{display:block;font-size:11.5px;color:#999;margin-bottom:4px;}
  .ep-row input[type=text],.ep-row textarea{
    width:100%;background:#212630;border:1px solid #353c48;border-radius:7px;
    padding:7px 10px;color:#dde1e8;font-size:12.5px;font-family:inherit;outline:none;transition:border-color .15s;}
  .ep-row input[type=text]:focus,.ep-row textarea:focus{border-color:var(--accent);}
  .ep-row textarea{resize:vertical;min-height:58px;line-height:1.5;}
  .ep-color-row{display:flex;align-items:center;gap:8px;}
  .ep-color-row input[type=color]{flex:none;width:36px;height:28px;padding:2px 3px;
    border:1px solid #353c48;border-radius:6px;background:#212630;cursor:pointer;}
  .ep-color-row input[type=text]{flex:1;}
  .ep-toggle-row{display:flex;align-items:center;justify-content:space-between;
    padding:9px 0;border-bottom:1px solid #252a31;}
  .ep-toggle-row span{font-size:12.5px;}
  .ep-toggle{position:relative;width:38px;height:21px;flex-shrink:0;}
  .ep-toggle input{opacity:0;width:0;height:0;position:absolute;}
  .ep-slider{position:absolute;inset:0;background:#3a404a;border-radius:21px;cursor:pointer;transition:background .2s;}
  .ep-slider:before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;
    background:#fff;border-radius:50%;transition:transform .2s;}
  .ep-toggle input:checked + .ep-slider{background:var(--accent);}
  .ep-toggle input:checked + .ep-slider:before{transform:translateX(17px);}
  .ep-toggle input:disabled + .ep-slider{opacity:.4;cursor:default;}
  .ep-export-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:9px;
    color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .15s;}
  .ep-export-btn:active{opacity:.8;}
  .ep-note{font-size:11px;color:#555;text-align:center;margin-top:7px;}
  .ep-add-block{width:100%;padding:9px;background:#1b2b1b;border:1px dashed #2a4a2a;
    border-radius:9px;color:#4caf72;font-size:12.5px;font-weight:700;cursor:pointer;
    margin-top:8px;transition:background .15s;}
  .ep-add-block:hover{background:#233323;}
  .ep-sec-swap{font-size:11px;color:#5a8fd4;background:rgba(47,127,212,.12);
    border:1px solid rgba(47,127,212,.25);border-radius:8px;padding:3px 8px;cursor:pointer;margin-left:4px;}
  .ep-sec-swap:hover{background:rgba(47,127,212,.25);}

  /* 팔레트 */
  .palette-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
  .palette-item{display:flex;align-items:center;gap:8px;background:#1e2329;
    border:1px solid #2e3545;border-radius:9px;padding:8px 10px;cursor:pointer;transition:border-color .15s;}
  .palette-item:hover{border-color:var(--primary);}
  .palette-swatches{display:flex;gap:3px;flex-shrink:0;}
  .palette-swatch{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.15);}
  .palette-name{flex:1;font-size:12px;color:#bbb;}
  .palette-del{flex:none;background:none;border:none;color:#555;font-size:14px;cursor:pointer;padding:0 2px;}
  .palette-del:hover{color:#c05050;}
  .ep-palette-save{width:100%;padding:8px;background:transparent;border:1px solid #353c48;
    border-radius:8px;color:#7ab8e8;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;}
  .ep-palette-save:hover{background:#1e2a38;}

  /* 인라인 편집 */
  body.edit-open [data-editable]{cursor:text;outline:none;border-radius:3px;}
  body.edit-open [data-editable]:hover{outline:1.5px dashed rgba(47,127,212,.5);outline-offset:3px;}
  body.edit-open [data-editable]:focus{outline:2px solid var(--primary);outline-offset:3px;
    background:rgba(47,127,212,.05);}

  /* 블록 바 */
  .block-bar{display:none;align-items:center;justify-content:space-between;
    background:rgba(47,127,212,.08);border-bottom:1px solid rgba(47,127,212,.2);
    padding:6px 14px;gap:8px;}
  body.edit-open .block-bar{display:flex;}
  .block-chip{background:rgba(47,127,212,.18);border:1px solid rgba(47,127,212,.4);
    color:#7ab8e8;font-size:12px;font-weight:700;border-radius:14px;padding:5px 13px;
    cursor:pointer;transition:background .15s;}
  .block-chip:hover{background:rgba(47,127,212,.35);color:#fff;}
  .block-actions{display:flex;gap:4px;}
  .block-act{background:#edf2f7;border:1px solid #d0d7e2;color:#5a6475;font-size:12px;
    border-radius:8px;padding:4px 9px;cursor:pointer;transition:background .15s;line-height:1.2;}
  .block-act:hover{background:#dce6f0;color:#2c3547;}
  .block-del:hover{background:#fde8e8;color:#c0392b;border-color:#f5b4b4;}

  /* 컴포넌트 피커 */
  .cp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .cp-overlay.hidden{display:none;}
  .cp-modal{background:#1a1d21;border-radius:18px;width:min(620px,96vw);max-height:82vh;
    overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.7);display:flex;flex-direction:column;}
  .cp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
    border-bottom:1px solid #2e3238;flex-shrink:0;}
  .cp-head span{color:#fff;font-weight:700;font-size:14px;}
  .cp-close{background:none;border:none;color:#666;font-size:20px;cursor:pointer;line-height:1;}
  .cp-close:hover{color:#fff;}
  .cp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:16px;}
  .cp-card{background:#212630;border:2px solid #2e3238;border-radius:12px;padding:20px 14px 16px;
    cursor:pointer;text-align:center;transition:border-color .15s,background .15s;}
  .cp-card:hover{border-color:var(--primary);background:#252e3a;}
  .cp-card.active{border-color:var(--accent)!important;background:#192c20;}
  .cp-ico{font-size:30px;margin-bottom:9px;}
  .cp-name{font-size:13px;font-weight:700;color:#dde1e8;}
  .cp-desc{font-size:11px;color:#6a7280;margin-top:5px;line-height:1.45;}
  .cp-footer{padding:12px 16px;border-top:1px solid #2e3238;flex-shrink:0;}
  .cp-add-after{width:100%;padding:9px;background:transparent;border:1px dashed #3a404a;
    color:#7ab8e8;font-size:12.5px;font-weight:700;border-radius:9px;cursor:pointer;transition:background .15s;}
  .cp-add-after:hover{background:#1e2a38;}

  /* 히스토리 패널 */
  .hp{position:fixed;top:0;left:0;height:100vh;width:320px;background:#13161a;color:#e0e2e6;
    z-index:70;display:flex;flex-direction:column;
    transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:6px 0 28px rgba(0,0,0,.5);}
  .hp.open{transform:translateX(0);}
  .hp-header{display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px;background:#0e1114;border-bottom:1px solid #2e3238;flex-shrink:0;}
  .hp-header h3{margin:0;font-size:13px;font-weight:700;color:#fff;}
  .hp-close{background:none;border:none;color:#777;font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
  .hp-close:hover{color:#fff;}
  .hp-save-row{padding:11px 14px;border-bottom:1px solid #2e3238;display:flex;gap:8px;flex-shrink:0;}
  .hp-name-input{flex:1;background:#1e2329;border:1px solid #353c48;border-radius:8px;

<script>
/* 기본 캠페인 데이터 (인라인 — 항상 동작) */
/* =========================================================
 * 캠페인 데이터: 국민콜 110 (국민권익위원회)
 * ---------------------------------------------------------
 * 이 파일 하나가 캠페인 하나의 "기획서 + 시안 + 제작 스펙"입니다.
 * 텍스트/이미지/미션 구성을 여기서만 수정하면 페이지에 반영됩니다.

      +'<div class="block-actions">'

      +(i<len-1?'<button class="block-act" data-moveidx="'+i+'" data-movedir="1">↓</button>':'')
      +'<button class="block-act" data-copyidx="'+i+'" title="복사">⧉</button>'

  /* =========================================================
     6. 인터랙션 바인딩

  function bindAll(){
    document.querySelectorAll('.qcard').forEach(function(card){
      card.addEventListener('click', function(){
        var wrap = card.closest('.quiz-wrap');
        if(!wrap || wrap.classList.contains('quiz-answered')) return;
        wrap.classList.add('quiz-answered');
        var isCorrect = card.dataset.correct === 'true';
        card.classList.add(isCorrect ? 'correct-reveal' : 'wrong-reveal');
        wrap.querySelectorAll('.qcard[data-correct="true"]').forEach(function(c){
          c.classList.add('correct-reveal');
        });
        toast(isCorrect ? '✅ 정답이에요! 🌱 콩 1개 적립!' : '❌ 틀렸어요. 정답을 확인해보세요.',
              isCorrect ? 'bean' : '');
        var sec = card.closest('section');
        if(sec){ var btn = sec.querySelector('.cta-btn'); if(btn) btn.style.display='inline-flex'; }
      });
    });

    document.querySelectorAll('.cta-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        if(btn.disabled) return;
        var bean = btn.dataset.bean;
        toast(bean ? '🌱 '+bean+' 적립!' : '✅ 참여 완료!', bean ? 'bean' : '');
        btn.textContent = '✓ 완료';
        btn.disabled = true;
      });
    });

    var sub = document.getElementById('cmtSubmit');
    if(sub){
      sub.addEventListener('click', function(){
        var inp = document.getElementById('cmtInput');
        var txt = inp ? inp.value.trim() : '';
        if(!txt){ toast('댓글을 입력해주세요.'); return; }
        var list = document.getElementById('cmtList');
        var cnt  = document.getElementById('cmtCount');
        var d2 = new Date();
        var ds = d2.getFullYear()+'.'+String(d2.getMonth()+1).padStart(2,'0')+'.'+String(d2.getDate()).padStart(2,'0');
        var el = document.createElement('div');
        el.className = 'cmt-item';
        el.innerHTML = '<div class="av"></div><div>'
          +'<div><span class="cmt-name">user****</span><span class="cmt-date">'+ds+'</span></div>'
          +'<div class="cmt-text">'+esc(txt)+'</div>'
          +'<div class="cmt-act"><span>답글</span><span>♡ 0</span></div>'
          +'</div>';
        list.insertBefore(el, list.firstChild);
        if(cnt) cnt.textContent = parseInt(cnt.textContent||0)+1;
        inp.value = '';
        toast('🌱 댓글 등록 완료! 콩 1개 적립!', 'bean');
      });
    }

    document.querySelectorAll('.share-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var ch = btn.dataset.channel||'링크';
        try {
          navigator.clipboard.writeText(location.href).then(function(){
            toast('🔗 '+ch+' 공유 링크가 복사됐습니다!');
          }).catch(function(){ toast('🔗 '+ch+' 공유 링크 복사됨!'); });
        } catch(e){ toast('🔗 '+ch+' 공유 링크 복사됨!'); }
      });
    });

    document.querySelectorAll('.img-ph[data-imgkey]').forEach(bindImgDrop);

    document.querySelectorAll('[data-swapidx]').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        showCompPicker(+btn.dataset.swapidx);
      });

  function bindImgDrop(ph){
    ph.addEventListener('dragover',  function(e){ e.preventDefault(); ph.classList.add('drag-over'); });
    ph.addEventListener('dragleave', function(){ ph.classList.remove('drag-over'); });
    ph.addEventListener('drop', function(e){
      e.preventDefault(); ph.classList.remove('drag-over');
      var f = e.dataTransfer.files[0];
      if(f && f.type.startsWith('image/')) readImg(f, ph);
    });
    ph.addEventListener('click', function(){
      if(!document.body.classList.contains('edit-open')) return;
      var inp = document.createElement('input');
      inp.type='file'; inp.accept='image/*';
      inp.onchange = function(){ if(inp.files[0]) readImg(inp.files[0], ph); };
      inp.click();
    });
  }
  function compressImage(dataUrl, maxW, quality, cb){
    var im = new Image();
    im.onload = function(){
      var w = im.width, h = im.height;
      if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(im, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', quality));
    };
    im.src = dataUrl;
  }

  function readImg(file, ph){
    var reader = new FileReader();
    reader.onload = function(e){
      var raw = e.target.result;
      compressImage(raw, 1200, 0.82, function(url){
        var key = ph.dataset.imgkey;
        var img = document.createElement('img');
        img.className = 'img-real'; img.src = url;
        var wrap = document.createElement('div');
        wrap.className = 'img-wrapper'; wrap.dataset.imgkey = key;
        wrap.appendChild(img);
        ph.parentNode.replaceChild(wrap, ph);
        setVal(key, url);
        save();
        var kb = Math.round(url.length * 0.75 / 1024);
        toast('✅ 이미지 업로드 완료! (' + kb + 'KB)');
      });
    };
    reader.readAsDataURL(file);
  }

  function getVal(path){
    var parts = path.split('.');
    var cur = draft;
    for(var i=0;i<parts.length;i++){
      if(cur==null) return undefined;
      cur = /^\d+$/.test(parts[i]) ? cur[+parts[i]] : cur[parts[i]];
    }
    return cur;
  }
  function setVal(path, val){
    var parts = path.split('.');
    var cur = draft;
    for(var i=0;i<parts.length-1;i++){
      var k = parts[i];
      cur = /^\d+$/.test(k) ? cur[+k] : cur[k];
      if(cur==null) return;
    }
    var last = parts[parts.length-1];
    if(/^\d+$/.test(last)) cur[+last] = val;
    else cur[last] = val;
  }

    overlay.id = 'compPicker';

    box.innerHTML = '<div style="color:#fff;font-size:15px;font-weight:700;margin-bottom:18px;">미션 '+(idx+1)+' 블록 교체</div>'
      + MISSION_TYPES.map(function(t){
          var active = draft.missions[idx].type === t.type;
          return '<div data-pick="'+t.type+'" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;margin-bottom:6px;background:'+(active?'rgba(22,194,101,.18)':'rgba(255,255,255,.04)')+';border:1px solid '+(active?'#16c265':'transparent')+';">'
            +'<span style="font-size:22px;">'+t.ico+'</span>'
            +'<span><b style="color:#fff;font-size:13px;">'+t.name+'</b><br><span style="color:#888;font-size:12px;">'+t.desc+'</span></span>'
            +'</div>';
        }).join('')
      + '<div style="margin-top:16px;text-align:right;"><button id="compPickerClose" style="background:#33373c;border:1px solid #4a4f55;color:#aaa;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;">취소</button></div>';

    overlay.appendChild(box);
    document.body.appendChild(overlay);

    box.querySelectorAll('[data-pick]').forEach(function(row){
      row.addEventListener('click', function(){
        var newType = row.dataset.pick;
        if(newType === draft.missions[idx].type){ overlay.remove(); return; }
        recordUndo();
        var newM = clone(MISSION_DEFAULTS[newType] || MISSION_DEFAULTS['custom']);
        // 공통 필드 유지
        newM.band = draft.missions[idx].band || newM.band;
        draft.missions[idx] = newM;

        overlay.remove();
        toast('블록이 '+getMissionTypeInfo(newType).name+'으로 교체됨');

  var PALETTE_KEY = 'hb_palettes_v1';
  function loadPalettes(){ try{ return JSON.parse(localStorage.getItem(PALETTE_KEY)||'[]'); }catch(e){ return []; } }

  function renderPaletteList(){
    var el = document.getElementById('paletteList');
    if(!el) return;
    var list = loadPalettes();
    if(!list.length){ el.innerHTML='<div style="font-size:12px;color:#666;padding:4px 0;">저장된 팔레트가 없습니다</div>'; return; }
    el.innerHTML = list.map(function(p,i){
      var swatches = [p.primary,p.secondary,p.accent,p.bg].filter(Boolean).map(function(c){
        return '<span class="palette-swatch" style="background:'+c+'"></span>';
      }).join('');
      return '<div class="palette-item" data-pi="'+i+'" style="cursor:pointer;">'
        +'<span class="palette-swatches">'+swatches+'</span>'
        +'<span class="palette-name">'+esc(p.name||('팔레트 '+(i+1)))+'</span>'
        +'<button class="palette-del" data-del="'+i+'" title="삭제">✕</button>'
        +'</div>';
    }).join('');
    el.querySelectorAll('[data-pi]').forEach(function(item){
      item.addEventListener('click', function(e){
        if(e.target.dataset.del !== undefined) return;
        var p = loadPalettes()[+item.dataset.pi];
        if(!p) return;
        if(p.primary)   { draft.theme.primary=p.primary; }
        if(p.secondary) { draft.theme.secondary=p.secondary; }
        if(p.accent)    { draft.theme.accent=p.accent; }
        if(p.bg)        { draft.theme.bg=p.bg; }
        markDirty(); render(); syncColorPickers();
      });
    });
    el.querySelectorAll('[data-del]').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        var list2 = loadPalettes();
        list2.splice(+btn.dataset.del, 1);
        savePalettes(list2);
        renderPaletteList();
      });
    });
  }

  function buildEpContent(){
    var el = document.getElementById('epContent');
    if(!el) return;
    var d = draft, html = '';
    function row(label, key, multi){
      var v = esc(getVal(key)||'');
      if(multi) return '<div class="ep-row"><label>'+label+'</label><textarea data-epkey="'+key+'">'+v+'</textarea></div>';
      return '<div class="ep-row"><label>'+label+'</label><input type="text" data-epkey="'+key+'" value="'+v+'"></div>';
    }
    html += '<div class="ep-group"><div class="ep-group-label">히어로</div>'
      + row('기관명','hero.org') + row('헤드라인','hero.title',true) + row('서브 카피','hero.sub',true)
      + '</div>';
    (d.missions||[]).forEach(function(m, i){
      html += '<div class="ep-group"><div class="ep-group-label">미션 '+(i+1)+' ('+m.type+')</div>';
      if(m.title!==undefined)    html += row('제목','missions.'+i+'.title',true);
      if(m.sub!==undefined)      html += row('서브','missions.'+i+'.sub',true);
      if(m.head!==undefined)     html += row('헤드','missions.'+i+'.head',true);
      if(m.section!==undefined)  html += row('섹션 제목','missions.'+i+'.section',true);
      if(m.question!==undefined) html += row('질문','missions.'+i+'.question',true);
      // 퀴즈 보기 항목 편집
      if(m.type==='quiz' && m.answers){
        (m.answers).forEach(function(a, ai){
          var isCorrect = String(a.note||'').indexOf('정답')>-1;
          html += '<div class="ep-row"><label>보기 '+(ai+1)+(isCorrect?' ✅':'')+'</label>'
            +'<div style="display:flex;gap:6px;align-items:flex-start;">'
            +'<textarea data-epkey="missions.'+i+'.answers.'+ai+'.t" style="flex:1;">'+esc(a.t||'')+'</textarea>'
            +'<button data-toggle-correct="'+i+'-'+ai+'" title="정답으로 설정" style="flex:none;background:'+(isCorrect?'#16c265':'#2a3040')+';border:none;border-radius:6px;color:#fff;font-size:11px;padding:6px 7px;cursor:pointer;margin-top:1px;">정답</button>'
            +'</div></div>';
        });
      }
      if(m.cta!==undefined)      html += row('CTA 버튼','missions.'+i+'.cta');
      if(m.bean!==undefined)     html += row('콩 텍스트','missions.'+i+'.bean');
      html += '</div>';
    });
    if(d.sns)      html += '<div class="ep-group"><div class="ep-group-label">SNS 밴드</div>'+row('카피','sns.copy')+'</div>';
    if(d.donation) html += '<div class="ep-group"><div class="ep-group-label">기부금 안내</div>'+row('리드','donation.lead')+row('금액','donation.amount')+row('설명','donation.desc',true)+row('CTA','donation.cta')+'</div>';
    if(d.share)    html += '<div class="ep-group"><div class="ep-group-label">공유 밴드</div>'+row('카피','share.copy')+'</div>';
    if(d.comments) html += '<div class="ep-group"><div class="ep-group-label">댓글 참여</div>'+row('제목','comments.title',true)+row('안내','comments.guide',true)+'</div>';
    el.innerHTML = html;
    el.querySelectorAll('[data-epkey]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var key = inp.dataset.epkey;
        setVal(key, inp.value);
        var domEl = document.querySelector('[data-key="'+key+'"]');
        if(domEl && document.activeElement !== domEl) domEl.innerText = inp.value;
        markDirty();
      });
    });
    // 퀴즈 정답 토글
    el.querySelectorAll('[data-toggle-correct]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var parts = btn.dataset.toggleCorrect.split('-');
        var mi = +parts[0], ai = +parts[1];

        answers.forEach(function(a, idx){
          a.note = (idx===ai) ? '정답' : '';
        });

        document.getElementById('epSections').classList.add('hidden');
        document.getElementById('epPlan').classList.add('hidden');
        toast('정답 설정됨');
      });
    });

  var _undoStack = [], _redoStack = [];
  var _undoReady = false;
  var MAX_UNDO = 40;

  function recordUndo(){
    if(!_undoReady) return;
    _undoStack.push(clone(draft));
    if(_undoStack.length > MAX_UNDO) _undoStack.shift();
    _redoStack = [];
    updateUndoUI();
  }
  function undo(){
    if(!_undoStack.length) return;
    _redoStack.push(clone(draft));
    draft = _undoStack.pop();
    localStorage.setItem(storageKey, JSON.stringify(draft));
    applyTheme(draft.theme);
    render();
    syncColorPickers();
    updateUndoUI();
    toast('실행 취소');
  }
  function redo(){
    if(!_redoStack.length) return;
    _undoStack.push(clone(draft));
    draft = _redoStack.pop();
    localStorage.setItem(storageKey, JSON.stringify(draft));
    applyTheme(draft.theme);
    render();
    syncColorPickers();
    updateUndoUI();
    toast('다시 실행');
  }
  function updateUndoUI(){
    var u = document.getElementById('undoBtn');
    var r = document.getElementById('redoBtn');
    if(u) u.classList.toggle('on', _undoStack.length > 0);
    if(r) r.classList.toggle('on', _redoStack.length > 0);
  }
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('redoBtn').addEventListener('click', redo);
  document.addEventListener('keydown', function(e){
    if((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key==='z'){ e.preventDefault(); undo(); }
    if((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.shiftKey&&e.key==='Z'))){ e.preventDefault(); redo(); }
  });

  var snapKey = 'hb_snaps_v1_' + C.meta.id;

  var _hpPreviewSnapId = null;

  function getSnaps(){
    try{ return JSON.parse(localStorage.getItem(snapKey)||'[]'); }catch(e){ return []; }
  }
  function putSnaps(arr){ localStorage.setItem(snapKey, JSON.stringify(arr)); }

  function saveSnapshot(name){
    var snaps = getSnaps();
    var nm = (name||'').trim() || ('스냅샷 '+new Date().toLocaleTimeString('ko-KR'));
    snaps.unshift({
      id: Date.now(),
      name: nm,
      ts: new Date().toISOString(),
      missionCount: (draft.missions||[]).length,
      types: (draft.missions||[]).map(function(m){ return m.type; }),
      data: clone(draft)
    });
    if(snaps.length > MAX_SNAPS) snaps = snaps.slice(0, MAX_SNAPS);
    putSnaps(snaps);
    renderHpList();
    return nm;
  }
  function deleteSnapshot(id){
    putSnaps(getSnaps().filter(function(s){ return s.id !== id; }));
    renderHpList();
  }
  function restoreSnapshot(id){
    var snap = null;
    var snaps = getSnaps();
    for(var i=0;i<snaps.length;i++){ if(snaps[i].id===id){ snap=snaps[i]; break; } }
    if(!snap) return;
    draft = clone(snap.data);
    localStorage.setItem(storageKey, JSON.stringify(draft));
    applyTheme(draft.theme);
    render();
    syncColorPickers();
    toast(snap.name+' 버전으로 복원됐어요');
  }
  function fmtTs(iso){
    try{
      var d2 = new Date(iso), now = new Date();
      var diff = Math.floor((now - d2) / 1000);
      if(diff < 60) return '방금 전';
      if(diff < 3600) return Math.floor(diff/60)+'분 전';
      if(diff < 86400) return Math.floor(diff/3600)+'시간 전';
      if(diff < 86400*7) return Math.floor(diff/86400)+'일 전';
      return d2.toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }catch(e){ return ''; }
  }
  function renderHpList(){
    var list = document.getElementById('hpList');
    var footer = document.getElementById('hpFooter');
    if(!list) return;
    var snaps = getSnaps();
    if(!snaps.length){
      list.innerHTML = '<div class="hp-empty">저장된 버전이 없어요.<br>이름을 입력하고 저장해보세요.</div>';
      if(footer) footer.textContent = '';

    list.innerHTML = snaps.map(function(s, idx){
      var isOrig = idx === snaps.length-1;
      var typeChips = (s.types||[]).map(function(t){ return getMissionTypeInfo(t).ico; }).join(' ');
      return '<div class="hp-item'+(isOrig?' hp-orig':'')+'" data-snapid="'+s.id+'">'
        +'<div class="hp-item-name">'+esc(s.name)+(isOrig?' <span class="hp-orig-badge">최초</span>':'')+'</div>'
        +'<div class="hp-item-ts">'+fmtTs(s.ts)+'</div>'

        +(isOrig?'':'<button class="hp-del" data-did="'+s.id+'">X</button>')
        +'</div></div>';
    }).join('');
    list.querySelectorAll('[data-rid]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var snapId = +btn.dataset.rid;
        var snaps2 = getSnaps();
        var found = null;
        for(var i=0;i<snaps2.length;i++){ if(snaps2[i].id===snapId){ found=snaps2[i]; break; } }

  }
  function openPreview(id){
    var snap = null;

  function buildEpPlan(){
    var el = document.getElementById('epPlan');
    if(!el) return;
    var d = draft, html = '';

    function planRow(label, key){
      var v = esc(getVal(key)||'');
      return '<div class="ep-row"><label>'+label+'</label>'
        +'<textarea data-epkey="'+key+'" style="min-height:72px;">'+v+'</textarea></div>';
    }
    function assetsRow(key, arr){
      var v = (arr||[]).join('\n');
      return '<div class="ep-row"><label>필요 에셋 (줄바꿈으로 구분)</label>'
        +'<textarea data-plan-assets="'+key+'" style="min-height:58px;">'+esc(v)+'</textarea></div>';
    }

    // 히어로
    html += '<div class="ep-group"><div class="ep-group-label">히어로 — 기획·스펙</div>'
      + planRow('기획 의도','hero.plan')
      + assetsRow('hero', d.hero.spec && d.hero.spec.assets)
      + planRow('인터랙션 정의','hero.spec.interaction')
      + planRow('비고','hero.spec.note')
      +'</div>';

    // 미션들
    (d.missions||[]).forEach(function(m,i){
      html += '<div class="ep-group"><div class="ep-group-label">미션 '+(i+1)+' ('+m.type+') — 기획·스펙</div>'
        + planRow('기획 의도','missions.'+i+'.plan')
        + assetsRow('missions.'+i, m.spec && m.spec.assets)
        + planRow('인터랙션 정의','missions.'+i+'.spec.interaction')
        + planRow('비고','missions.'+i+'.spec.note')
        +'</div>';
    });

    // 기타 섹션
    var others = [];
    if(d.sns)      others.push({label:'SNS 밴드', base:'sns'});
    if(d.donation) others.push({label:'기부금 안내', base:'donation'});
    if(d.share)    others.push({label:'공유 밴드', base:'share'});
    if(d.comments) others.push({label:'댓글 참여', base:'comments'});
    others.forEach(function(o){
      html += '<div class="ep-group"><div class="ep-group-label">'+o.label+' — 기획</div>'
        + planRow('기획 의도', o.base+'.plan')
        +'</div>';
    });

    el.innerHTML = html;

    // data-epkey 바인딩 (plan/spec 텍스트)
    el.querySelectorAll('[data-epkey]').forEach(function(inp){
      inp.addEventListener('input', function(){
        setVal(inp.dataset.epkey, inp.value);
        markDirty();
      });
    });
    // data-plan-assets 바인딩 (에셋 배열)
    el.querySelectorAll('[data-plan-assets]').forEach(function(ta){
      ta.addEventListener('input', function(){
        var key = ta.dataset.planAssets;
        var arr = ta.value.split('\n').map(function(s){ return s.trim(); }).filter(Boolean);
        setVal(key+'.spec.assets', arr);
        markDirty();
      });
    });
  }

  ========================================================= */
  (function(){
    var dragSrc = null;
    function addDragToRows(){
      var rows = document.querySelectorAll('#epSections .ep-toggle-row[data-misi]');
      rows.forEach(function(row){
        row.setAttribute('draggable','true');
        row.addEventListener('dragstart', function(e){
          dragSrc = row;
          e.dataTransfer.effectAllowed = 'move';
          row.style.opacity = '0.4';
        });
        row.addEventListener('dragend', function(){
          row.style.opacity = '';
          document.querySelectorAll('#epSections .ep-toggle-row').forEach(function(r){
            r.classList.remove('drag-over-row');
          });
        });
        row.addEventListener('dragover', function(e){
          e.preventDefault(); e.dataTransfer.dropEffect = 'move';
          if(row !== dragSrc) row.classList.add('drag-over-row');
        });
        row.addEventListener('dragleave', function(){ row.classList.remove('drag-over-row'); });
        row.addEventListener('drop', function(e){
          e.preventDefault();
          if(!dragSrc || dragSrc === row) return;
          var fromIdx = +dragSrc.dataset.misi;
          var toIdx   = +row.dataset.misi;
          recordUndo();
          var m = draft.missions.splice(fromIdx, 1)[0];
          draft.missions.splice(toIdx, 0, m);
          markDirty();
          render(); buildEpContent(); buildEpSections(); buildEpPlan();
          toast('순서 변경됨');
        });
      });
    }
    // buildEpSections 호출 후마다 드래그 재바인딩
    var _origBuild = buildEpSections;
    buildEpSections = function(){
      _origBuild();
      addDragToRows();
    };
    addDragToRows();
  })();


  /* =========================================================
     코멘트(핀) 시스템
  ========================================================= */
  (function(){
    var CMT_KEY = 'hb_comments_v1_' + (draft.meta.id || 'default');
    var BIN_KEY  = 'hb_bin_id_' + (draft.meta.id || 'default');
    var JKEY     = '$2a$10$Pz6EsZEPeHA0GJYMxl3uEOhBkzmkTND.YzBG9Pc3iR5cxfguB.4lO';
    var commentMode = false;
    var pinsHidden = false;
    var activePopup = null;
    var _syncing = false;

    /* 로컬 캐시 읽기/쓰기 (동기) */
    function loadComments(){ try{ return JSON.parse(localStorage.getItem(CMT_KEY)||'[]'); }catch(e){ return []; } }
    function saveComments(arr){
      localStorage.setItem(CMT_KEY, JSON.stringify(arr));
      pushToServer(arr);
    }

    /* JSONBin 동기화 */
    function getBinId(){ return localStorage.getItem(BIN_KEY) || null; }
    function setBinId(id){ localStorage.setItem(BIN_KEY, id); }

    function showSyncStatus(msg, ok){
      var el = document.getElementById('syncStatus');
      if(!el) return;
      el.textContent = msg;
      el.style.color = ok ? '#16c265' : '#e88';
      clearTimeout(el._t);
      el._t = setTimeout(function(){ el.textContent = ''; }, 3000);
    }

    function pushToServer(arr){
      if(_syncing) return;
      _syncing = true;
      var binId = getBinId();
      var body  = JSON.stringify({comments: arr});
      var headers = {
        'Content-Type': 'application/json',
        'X-Master-Key': JKEY
      };
      if(binId){
        fetch('https://api.jsonbin.io/v3/b/' + binId, {method:'PUT', headers:headers, body:body})
          .then(function(r){ _syncing=false; if(r.ok) showSyncStatus('☁ 동기화됨', true); else showSyncStatus('동기화 실패', false); })
          .catch(function(){ _syncing=false; showSyncStatus('동기화 실패', false); });
      } else {
        var h2 = Object.assign({}, headers, {'X-Bin-Name':'hb-cmt-'+(draft.meta.id||'default'), 'X-Bin-Private':'false'});
        fetch('https://api.jsonbin.io/v3/b', {method:'POST', headers:h2, body:body})
          .then(function(r){ return r.json(); })
          .then(function(d){ setBinId(d.metadata.id); _syncing=false; showSyncStatus('☁ 저장됨', true); })
          .catch(function(){ _syncing=false; showSyncStatus('동기화 실패', false); });
      }
    }

    function pullFromServer(cb){
      var binId = getBinId();
      if(!binId){ cb && cb(); return; }
      showSyncStatus('동기화 중…', true);
      fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
        headers:{'X-Master-Key': JKEY}
      })
        .then(function(r){ return r.json(); })
        .then(function(d){
          var arr = (d.record && d.record.comments) || [];
          localStorage.setItem(CMT_KEY, JSON.stringify(arr));
          showSyncStatus('☁ 불러옴 ('+arr.length+'개)', true);
          renderPins();
          cb && cb();
        })
        .catch(function(){ showSyncStatus('서버 연결 실패', false); cb && cb(); });
    }

    function formatTime(iso){
      var d = new Date(iso);
      return (d.getMonth()+1)+'/'+(d.getDate())+' '
        +('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
    }

    /* 핀 전체 렌더 */
    function renderPins(){
      document.querySelectorAll('.cmt-pin').forEach(function(p){ p.remove(); });
      if(pinsHidden) return;
      var app = document.getElementById('app');
      if(!app) return;
      app.style.position = 'relative';
      var cmts = loadComments();
      cmts.forEach(function(c, idx){
        var pin = document.createElement('div');
        pin.className = 'cmt-pin' + (c.resolved ? ' resolved' : '');
        pin.style.left = c.xPct + '%';
        pin.style.top = c.yAbs + 'px';
        pin.innerHTML = '<span class="pin-num">' + (idx+1) + '</span>';
        pin.addEventListener('click', function(e){
          e.stopPropagation();
          openThreadPopup(idx, pin);
        });
        app.appendChild(pin);
      });
    }

    /* 팝업 닫기 */
    function closePopup(){
      if(activePopup){ activePopup.remove(); activePopup = null; }
    }

    /* 새 코멘트 입력 팝업 */
    function openNewPopup(xPct, yAbs, e){
      closePopup();
      var popup = document.createElement('div');
      popup.className = 'cmt-popup';
      popup.style.left = Math.min(e.clientX, window.innerWidth-320) + 'px';
      popup.style.top = Math.min(e.clientY+10, window.innerHeight-260) + 'px';
      popup.innerHTML =
        '<div class="cmt-popup-head"><span>💬 새 코멘트</span><button class="close-btn">✕</button></div>'
        +'<div class="cmt-popup-footer">'
        +'<input id="cmtAuthor" placeholder="이름 (예: 기획자 이현수)" maxlength="30">'
        +'<textarea id="cmtText" rows="3" placeholder="코멘트 내용을 입력하세요"></textarea>'
        +'<div class="cmt-popup-actions">'
        +'<button class="cmt-popup-actions cmt-btn-resolve" id="cmtCancel">취소</button>'
        +'<button class="cmt-btn-send" id="cmtSend">등록</button>'
        +'</div></div>';
      document.body.appendChild(popup);
      activePopup = popup;

      // 마지막 작성자 기억
      var savedAuthor = localStorage.getItem('hb_cmt_author') || '';
      popup.querySelector('#cmtAuthor').value = savedAuthor;
      popup.querySelector('#cmtText').focus();

      popup.querySelector('.close-btn').addEventListener('click', function(){ closePopup(); toggleCommentMode(false); });
      popup.querySelector('#cmtCancel').addEventListener('click', function(){ closePopup(); toggleCommentMode(false); });
      popup.querySelector('#cmtSend').addEventListener('click', function(){
        var author = popup.querySelector('#cmtAuthor').value.trim() || '익명';
        var text = popup.querySelector('#cmtText').value.trim();
        if(!text) return;
        localStorage.setItem('hb_cmt_author', author);
        var cmts = loadComments();
        cmts.push({ id: Date.now(), xPct: xPct, yAbs: yAbs, author: author, text: text,
                    time: new Date().toISOString(), resolved: false, replies: [] });
        saveComments(cmts);
        closePopup();
        toggleCommentMode(false);
        renderPins();
        toast('코멘트 등록됨');
      });
    }

    /* 기존 핀 스레드 팝업 */
    function openThreadPopup(idx, pinEl){
      closePopup();
      var cmts = loadComments();
      var c = cmts[idx];
      if(!c) return;

      var popup = document.createElement('div');
      popup.className = 'cmt-popup';
      var rect = pinEl.getBoundingClientRect();
      popup.style.left = Math.min(rect.right+8, window.innerWidth-320) + 'px';
      popup.style.top = Math.max(rect.top-8, 10) + 'px';

      function renderThread(){
        var cmts2 = loadComments(); var c2 = cmts2[idx];
        var threadHtml = '<div class="cmt-thread-item">'
          +'<span class="cmt-thread-author">'+esc(c2.author)+'</span>'
          +'<span class="cmt-thread-time">'+formatTime(c2.time)+'</span>'
          +(c2.resolved?'<span class="cmt-resolved-badge">✓ 해결됨</span>':'')
          +'<div class="cmt-thread-text">'+esc(c2.text)+'</div></div>';
        (c2.replies||[]).forEach(function(r){
          threadHtml += '<div class="cmt-thread-item">'
            +'<span class="cmt-thread-author">'+esc(r.author)+'</span>'
            +'<span class="cmt-thread-time">'+formatTime(r.time)+'</span>'
            +'<div class="cmt-thread-text">'+esc(r.text)+'</div></div>';
        });
        popup.innerHTML =
          '<div class="cmt-popup-head"><span>💬 코멘트 #'+(idx+1)+'</span><button class="close-btn">✕</button></div>'
          +'<div class="cmt-popup-body">'+threadHtml+'</div>'
          +'<div class="cmt-popup-footer">'
          +'<input id="replyAuthor" placeholder="이름" maxlength="30" value="'+(localStorage.getItem('hb_cmt_author')||'')+'">'
          +'<textarea id="replyText" rows="2" placeholder="답글 달기..."></textarea>'
          +'<div class="cmt-popup-actions">'
          +(c2.resolved
            ? '<button class="cmt-btn-resolve" id="cmtReopen">다시 열기</button>'
            : '<button class="cmt-btn-resolve" id="cmtResolve">✓ 해결</button>')
          +'<button class="cmt-btn-del" id="cmtDel">삭제</button>'
          +'<button class="cmt-btn-send" id="cmtReply">답글</button>'
          +'</div></div>';

        popup.querySelector('.close-btn').addEventListener('click', closePopup);
        popup.querySelector('#cmtReply').addEventListener('click', function(){
          var author = popup.querySelector('#replyAuthor').value.trim() || '익명';
          var text = popup.querySelector('#replyText').value.trim();
          if(!text) return;
          localStorage.setItem('hb_cmt_author', author);
          var cmts3 = loadComments();
          cmts3[idx].replies = cmts3[idx].replies || [];
          cmts3[idx].replies.push({ author: author, text: text, time: new Date().toISOString() });
          saveComments(cmts3);
          renderThread();
        });
        var resolveBtn = popup.querySelector('#cmtResolve');
        if(resolveBtn) resolveBtn.addEventListener('click', function(){
          var cmts3 = loadComments(); cmts3[idx].resolved = true; saveComments(cmts3);
          renderThread(); renderPins();
        });
        var reopenBtn = popup.querySelector('#cmtReopen');
        if(reopenBtn) reopenBtn.addEventListener('click', function(){
          var cmts3 = loadComments(); cmts3[idx].resolved = false; saveComments(cmts3);
          renderThread(); renderPins();
        });
        popup.querySelector('#cmtDel').addEventListener('click', function(){
          if(!confirm('코멘트를 삭제할까요?')) return;
          var cmts3 = loadComments(); cmts3.splice(idx,1); saveComments(cmts3);
          closePopup(); renderPins();
        });
      }
      renderThread();
      document.body.appendChild(popup);
      activePopup = popup;
    }

    /* 코멘트 모드 토글 */
    function toggleCommentMode(force){
      commentMode = (force !== undefined) ? force : !commentMode;
      document.body.classList.toggle('comment-mode', commentMode);
      var btn = document.getElementById('commentModeBtn');
      if(btn) btn.style.background = commentMode ? '#16c265' : '';
      if(btn) btn.style.color = commentMode ? '#fff' : '';
      var hideBtn = document.getElementById('commentHideBtn');
      if(hideBtn) hideBtn.style.display = '';
    }

    /* 캔버스 클릭 → 핀 생성 */
    document.getElementById('app').addEventListener('click', function(e){
      if(!commentMode) return;
      e.stopPropagation();
      var app = document.getElementById('app');
      var rect = app.getBoundingClientRect();
      var xPct = ((e.clientX - rect.left) / rect.width * 100);
      var yAbs = (e.clientY - rect.top) + (window.pageYOffset || 0);
      openNewPopup(xPct, yAbs, e);
    });

    /* 툴바 버튼 */
    var cmBtn = document.getElementById('commentModeBtn');
    if(cmBtn) cmBtn.addEventListener('click', function(){ toggleCommentMode(); });

    var syncBtn = document.getElementById('syncPullBtn');
    if(syncBtn) syncBtn.addEventListener('click', function(){ pullFromServer(); });

    // draftPullBtn binding moved to main scope

    var hideBtn = document.getElementById('commentHideBtn');
    if(hideBtn) hideBtn.addEventListener('click', function(){
      pinsHidden = !pinsHidden;
      hideBtn.textContent = pinsHidden ? '핀 표시' : '핀 숨김';
      renderPins();
    });

    /* 팝업 외부 클릭 닫기 */
    document.addEventListener('click', function(e){
      if(activePopup && !activePopup.contains(e.target) && !e.target.closest('.cmt-pin')){
        closePopup();
      }
    });

    /* 초기 렌더 */
    renderPins();
    pullFromServer(); // 서버에서 최신 코멘트 로드
  })();


})();
}catch(e){
  document.getElementById("app").innerHTML='<div style="padding:40px;background:#fff3f3;border:2px solid #f00;border-radius:12px;margin:20px;font-family:monospace;font-size:13px;"><b>JS ERROR:</b><br>'+e.message+'<br><br><pre>'+e.stack+'</pre></div>';
  console.error(e);
}
</script>
</body>
